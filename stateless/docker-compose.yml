version: "3.8"

services:
  stream:
    container_name: stream
    build:
      context: ./
      dockerfile: ./stream/Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    networks: ["robot"]

  robot:
    container_name: robot
    build:
      context: ./
      dockerfile: ./robot/Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    networks: ["robot"]
  
  metrics-adapter:
    container_name: metrics-adapter
    build:
      context: ./
      dockerfile: ./metrics_adapter/Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "${METRICS_PORT}:8080"
    networks: ["robot"]

  database-worker:
    container_name: database-worker
    build:
      context: ./
      dockerfile: ./database_worker/Dockerfile
    environment:
      - PYTHONBUFFERED=1
    # ports:
      # - "${DB_WORKER_PORT}:8080"
    networks: ["robot"]

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    ports:
      - "${PROMTAIL_PORT}:9080"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    privileged: true
    networks: ["robot"]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "${CADVISOR_PORT}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks: ["robot"]

networks:
  robot:
    name: robot
  
